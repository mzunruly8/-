<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bounce Collect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
    }
    canvas {
        background: #222;
        display: block;
        margin: auto;
        border: 2px solid #555;
    }
    #ui {
        margin-top: 10px;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        margin: 5px;
        border: none;
        background: #4CAF50;
        color: white;
        cursor: pointer;
    }
</style>
</head>
<body>

<h2>Bounce Collect</h2>
<canvas id="game" width="400" height="600"></canvas>

<div id="ui">
    <div>Score: <span id="score">0</span></div>
    <button onclick="restart()">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, coins, score, gameOver;

function init() {
    player = {
        x: 200,
        y: 500,
        radius: 15,
        dy: 0,
        gravity: 0.5,
        bounce: -20
    };

    coins = [];
    score = 0;
    gameOver = false;

    for (let i = 0; i < 5; i++) spawnCoin();
}

function spawnCoin() {
    coins.push({
        x: Math.random() * 380 + 10,
        y: Math.random() * 400,
        radius: 10
    });
}

function update() {
    if (gameOver) return;

    player.dy += player.gravity;
    player.y += player.dy;

    if (player.y > canvas.height - player.radius) {
        player.y = canvas.height - player.radius;
        player.dy = player.bounce;
    }

    coins.forEach((coin, i) => {
        let dx = player.x - coin.x;
        let dy = player.y - coin.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < player.radius + coin.radius) {
            coins.splice(i, 1);
            spawnCoin();
            score++;
            document.getElementById("score").innerText = score;
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fillStyle = "cyan";
    ctx.fill();

    coins.forEach(coin => {
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
        ctx.fillStyle = "gold";
        ctx.fill();
    });
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

canvas.addEventListener("mousemove", e => {
    let rect = canvas.getBoundingClientRect();
    player.x = e.clientX - rect.left;
});

canvas.addEventListener("touchmove", e => {
    let rect = canvas.getBoundingClientClientRect;
    player.x = e.touches[0].clientX - rect.left;
});

function restart() {
    init();
}

init();
loop();
</script>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Arcade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Arial;
        text-align: center;
    }
    canvas {
        background: #222;
        border: 2px solid #555;
        display: none;
        margin: auto;
    }
    button {
        padding: 10px 20px;
        margin: 5px;
        font-size: 16px;
        border: none;
        background: #4CAF50;
        color: white;
        cursor: pointer;
    }
    #menu {
        margin-top: 20px;
    }
</style>
</head>
<body>

<h1>Mini Arcade</h1>

<div id="menu">
    <button onclick="startGame1()">Bounce Collect</button>
    <button onclick="startGame2()">Dodge Blocks</button>
</div>

<canvas id="game1" width="400" height="600"></canvas>
<canvas id="game2" width="400" height="600"></canvas>

<script>
/* ---------------- GAME 1 ---------------- */
let canvas1 = document.getElementById("game1");
let ctx1 = canvas1.getContext("2d");

let player1, coins, score1;

function startGame1() {
    canvas1.style.display = "block";
    canvas2.style.display = "none";
    initGame1();
}

function initGame1() {
    player1 = { x:200, y:500, dy:0, gravity:0.5, bounce:-18, radius:15 };
    coins = [];
    score1 = 0;

    for (let i=0;i<5;i++) spawnCoin();
}

function spawnCoin(){
    coins.push({
        x: Math.random()*380+10,
        y: Math.random()*400,
        r:10
    });
}

function updateGame1(){
    player1.dy += player1.gravity;
    player1.y += player1.dy;

    if(player1.y > canvas1.height - player1.radius){
        player1.y = canvas1.height - player1.radius;
        player1.dy = player1.bounce;
    }

    coins.forEach((c,i)=>{
        let dx = player1.x - c.x;
        let dy = player1.y - c.y;
        let dist = Math.sqrt(dx*dx+dy*dy);
        if(dist < player1.radius + c.r){
            coins.splice(i,1);
            spawnCoin();
            score1++;
        }
    });
}

function drawGame1(){
    ctx1.clearRect(0,0,400,600);

    ctx1.beginPath();
    ctx1.arc(player1.x, player1.y, player1.radius,0,Math.PI*2);
    ctx1.fillStyle="cyan";
    ctx1.fill();

    coins.forEach(c=>{
        ctx1.beginPath();
        ctx1.arc(c.x,c.y,c.r,0,Math.PI*2);
        ctx1.fillStyle="gold";
        ctx1.fill();
    });
}

canvas1.addEventListener("mousemove", e=>{
    let rect = canvas1.getBoundingClientRect();
    player1.x = e.clientX - rect.left;
});


/* ---------------- GAME 2 ---------------- */
let canvas2 = document.getElementById("game2");
let ctx2 = canvas2.getContext("2d");

let player2, blocks, score2;

function startGame2(){
    canvas2.style.display = "block";
    canvas1.style.display = "none";
    initGame2();
}

function initGame2(){
    player2 = { x:180, y:550, w:40, h:20 };
    blocks = [];
    score2 = 0;
}

function spawnBlock(){
    blocks.push({
        x: Math.random()*360,
        y: -20,
        w:40,
        h:20,
        speed: 3
    });
}

function updateGame2(){
    if(Math.random()<0.03) spawnBlock();

    blocks.forEach((b,i)=>{
        b.y += b.speed;

        if(
            player2.x < b.x + b.w &&
            player2.x + player2.w > b.x &&
            player2.y < b.y + b.h &&
            player2.y + player2.h > b.y
        ){
            alert("Game Over! Score: " + score2);
            initGame2();
        }

        if(b.y > 600){
            blocks.splice(i,1);
            score2++;
        }
    });
}

function drawGame2(){
    ctx2.clearRect(0,0,400,600);

    ctx2.fillStyle="lime";
    ctx2.fillRect(player2.x, player2.y, player2.w, player2.h);

    ctx2.fillStyle="red";
    blocks.forEach(b=>{
        ctx2.fillRect(b.x,b.y,b.w,b.h);
    });
}

canvas2.addEventListener("mousemove", e=>{
    let rect = canvas2.getBoundingClientRect();
    player2.x = e.clientX - rect.left;
});


/* ---------------- MAIN LOOP ---------------- */
function loop(){
    if(canvas1.style.display=="block"){
        updateGame1();
        drawGame1();
    }

    if(canvas2.style.display=="block"){
        updateGame2();
        drawGame2();
    }

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
