<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bounce Collect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
    }
    canvas {
        background: #222;
        display: block;
        margin: auto;
        border: 2px solid #555;
    }
    #ui {
        margin-top: 10px;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        margin: 5px;
        border: none;
        background: #4CAF50;
        color: white;
        cursor: pointer;
    }
</style>
</head>
<body>

<h2>Bounce Collect</h2>
<canvas id="game" width="400" height="600"></canvas>

<div id="ui">
    <div>Score: <span id="score">0</span></div>
    <button onclick="restart()">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, coins, score, gameOver;

function init() {
    player = {
        x: 200,
        y: 500,
        radius: 15,
        dy: 0,
        gravity: 0.5,
        bounce: -18
    };

    coins = [];
    score = 0;
    gameOver = false;

    for (let i = 0; i < 5; i++) spawnCoin();
}

function spawnCoin() {
    coins.push({
        x: Math.random() * 380 + 10,
        y: Math.random() * 400,
        radius: 10
    });
}

function update() {
    if (gameOver) return;

    player.dy += player.gravity;
    player.y += player.dy;

    if (player.y > canvas.height - player.radius) {
        player.y = canvas.height - player.radius;
        player.dy = player.bounce;
    }

    coins.forEach((coin, i) => {
        let dx = player.x - coin.x;
        let dy = player.y - coin.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < player.radius + coin.radius) {
            coins.splice(i, 1);
            spawnCoin();
            score++;
            document.getElementById("score").innerText = score;
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fillStyle = "cyan";
    ctx.fill();

    coins.forEach(coin => {
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
        ctx.fillStyle = "gold";
        ctx.fill();
    });
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

canvas.addEventListener("mousemove", e => {
    let rect = canvas.getBoundingClientRect();
    player.x = e.clientX - rect.left;
});

canvas.addEventListener("touchmove", e => {
    let rect = canvas.getBoundingClientClientRect;
    player.x = e.touches[0].clientX - rect.left;
});

function restart() {
    init();
}

init();
loop();
</script>

</body>
</html>
